{{- define "content" -}}
<h1>{{.Title}}</h1>
<aside id="preview"></aside>
<form id="edit-page" method="post" accept-charset="utf-8" action="/{{.PageName}}">
<textarea name="content" rows="40" cols="80" autofocus>
{{- .SourceContent -}}
</textarea>
<span class="editor-tools">
<button type="button" id="indent-btn" title="Indent (Ctrl+;)">&gt;</button>
<button type="button" id="dedent-btn" title="Dedent">&lt;</button>
<button type="submit">Save</button>
</span>
</form>
<script>
const editor = document.querySelector('textarea[name="content"]');
const preview = document.getElementById('preview');
let throttleTimer;

async function updatePreview() {
	if (window.getComputedStyle(preview).display === 'none') {
		return; // Don't update if preview is not visible.
	}
	const response = await fetch('/preview', {
		method: 'POST',
		headers: {
			'Content-Type': 'text/plain; charset=UTF-8',
		},
		body: editor.value,
	});
	if (!response.ok) {
		preview.innerHTML = `<div class="error">Error updating preview: ${response.status} ${response.statusText}</div>`;
		return;
	}
	preview.innerHTML = await response.text();
}

function schedulePreviewUpdate() {
	clearTimeout(throttleTimer);
	throttleTimer = setTimeout(updatePreview, 250); // 250ms throttle
}

editor.addEventListener('input', schedulePreviewUpdate);
// Initial preview on page load.
updatePreview();

function modifySelectedLines(fn) {
	const text = editor.value;
	const start = editor.selectionStart;
	const end = editor.selectionEnd;
	const lineStart = text.lastIndexOf('\n', start - 1) + 1;
	let lineEnd = text.indexOf('\n', start === end ? end : end - 1);
	if (lineEnd === -1) lineEnd = text.length;

	editor.selectionStart = lineStart;
	editor.selectionEnd = lineEnd;
	const modified = fn(text.substring(lineStart, lineEnd));
	document.execCommand('insertText', false, modified);

	editor.selectionStart = lineStart;
	editor.selectionEnd = lineStart + modified.length;
	schedulePreviewUpdate();
}

function indentLines(text) {
	return text.split('\n').map(line => '> ' + line).join('\n');
}

function dedentLines(text) {
	return text.split('\n').map(line => line.startsWith('> ') ? line.substring(2) : line).join('\n');
}

document.getElementById('indent-btn').addEventListener('click', () => {
	modifySelectedLines(indentLines);
	editor.focus();
});

document.getElementById('dedent-btn').addEventListener('click', () => {
	modifySelectedLines(dedentLines);
	editor.focus();
});

editor.addEventListener('keydown', (e) => {
	if (e.key === ';' && e.ctrlKey && !e.shiftKey && !e.altKey) {
		e.preventDefault();
		const text = editor.value;
		const start = editor.selectionStart;
		const end = editor.selectionEnd;
		const lineStart = text.lastIndexOf('\n', start - 1) + 1;
		let lineEnd = text.indexOf('\n', start === end ? end : end - 1);
		if (lineEnd === -1) lineEnd = text.length;
		const selected = text.substring(lineStart, lineEnd);
		const allIndented = selected.split('\n').every(line => line.startsWith('> '));
		modifySelectedLines(allIndented ? dedentLines : indentLines);
	}
});
</script>
{{- end -}}
